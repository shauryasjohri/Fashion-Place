version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: fashion-place-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashion-place
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fashion-place-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fashion-place
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL_CLIENT:-http://localhost:5000}
        VITE_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: fashion-place-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL_ADMIN:-http://localhost:5000}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: fashion-place-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  postgres_data:
